{#-
  Aviso de pendências, parte em HTML.

  Estilos vão embutidos em cada elemento, e não numa folha ou num bloco <style>:
  cliente de e-mail ignora a primeira e vários descartam o segundo. É verboso por
  necessidade, não por descuido.

  Sem imagens, deliberadamente: imagem remota em e-mail vaza confirmação de
  leitura ao remetente e aumenta a chance de o filtro de spam reter a mensagem.
-#}
{%- set fonte = "-apple-system,Segoe UI,Roboto,Arial,sans-serif" -%}
{%- set azul = "#1a4b7a" -%}
{%- set texto = "#1f2933" -%}
{%- set apagado = "#5a6570" -%}
{%- set borda = "#d0d5db" -%}
{%- set p = "margin:0 0 12px;font:15px/1.5 " ~ fonte ~ ";color:" ~ texto -%}
{%- set h2 = "font:600 14px/1.4 " ~ fonte ~ ";color:" ~ azul ~ ";text-transform:uppercase;letter-spacing:.04em;margin:24px 0 8px" -%}
<div style="max-width:600px;margin:0 auto;padding:24px;background:#ffffff">

  <div style="border-left:4px solid {{ azul }};padding-left:12px;margin-bottom:20px">
    <div style="font:700 18px/1.3 {{ fonte }};color:{{ azul }}">ARIADNE</div>
    <div style="font:13px/1.4 {{ fonte }};color:{{ apagado }}">Acompanhamento de orientação acadêmica</div>
  </div>

  <p style="{{ p }}">Olá, {{ pessoa.nome }}.</p>
  <p style="{{ p }}">Você tem <strong>{{ total }} pendência{{ 's' if total != 1 else '' }}</strong> no sistema.</p>

  {% for chave, itens in secoes.items() %}
    <h2 style="{{ h2 }}">{{ SECOES[chave][0] }}</h2>
    {% for item in itens %}
      <div style="border:1px solid {{ borda }};border-radius:4px;padding:10px 12px;margin-bottom:8px">
        <div style="font:600 15px/1.4 {{ fonte }};color:{{ texto }}">{{ item.titulo }}</div>
        <div style="font:13px/1.5 {{ fonte }};color:{{ apagado }};margin-top:2px">{{ item.detalhe }}</div>
      </div>
    {% endfor %}
  {% endfor %}

  <h2 style="{{ h2 }}">O que fazer</h2>
  <ul style="margin:0 0 16px;padding-left:20px;font:15px/1.6 {{ fonte }};color:{{ texto }}">
    {% for acao in providencias %}<li>{{ acao | capitalize }}.</li>{% endfor %}
  </ul>

  {% if url %}
  <p style="margin:0 0 24px">
    <a href="{{ url }}" style="display:inline-block;background:{{ azul }};color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:4px;font:600 15px {{ fonte }}">Abrir o ARIADNE</a>
  </p>
  {% endif %}

  <hr style="border:0;border-top:1px solid {{ borda }};margin:24px 0 12px">
  <p style="margin:0;font:12px/1.6 {{ fonte }};color:#8a939b">
    <strong>ARIADNE</strong> — {{ acronimo }}.<br>{{ rodape }}
  </p>
</div>
