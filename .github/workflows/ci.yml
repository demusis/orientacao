name: CI

# Roda o lint (ruff) e a suíte completa (pytest, inclusive test_relatorio) a
# cada push e pull request. Foi rodar a suíte inteira que revelou um defeito
# que os subconjuntos locais não pegavam — este workflow torna isso automático.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Testes (pytest)
        run: pytest -q
